name: coverage

# Coverage lives here, off the per-PR critical path, and is never a gate: it reports a
# number and publishes the README badge, it never fails a build on a threshold. A push to
# main (a PR landing) recomputes coverage on the merged tree and republishes the badge to
# the orphan `badges` branch; workflow_dispatch is a one-off run. PRs validate via the CI
# workflow (test.yaml) — coverage is not a gate, so it does not run per in-PR commit. The
# badge is a self-hosted shields endpoint, so there is no external service or token.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# A merge burst on main keeps only the newest run; each is a superset of the prior tree.
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: llvm-cov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pct: ${{ steps.fields.outputs.pct }}
      color: ${{ steps.fields.outputs.color }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Root package only (the benchmark crate is publish = false): lib + integration
      # tests under source-based instrumentation. Collect once, then report off the same
      # data twice — a human table to the run summary, then the JSON the badge reads.
      - name: Collect coverage
        run: cargo llvm-cov --no-report
      - name: Report to summary
        run: |
          {
            echo '### Coverage'
            echo ''
            echo '```'
            cargo llvm-cov report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Compute badge fields
        id: fields
        run: |
          PCT=$(cargo llvm-cov report --json --summary-only \
            | jq '.data[0].totals.lines.percent | floor')
          if   [ "$PCT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 80 ]; then COLOR=green
          elif [ "$PCT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$PCT" -ge 60 ]; then COLOR=yellow
          else                        COLOR=red
          fi
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "coverage: ${PCT}% (${COLOR})"
      # A browsable line-by-line report so keeping coverage healthy is easy.
      - name: Build HTML report
        run: cargo llvm-cov report --html
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html/
          retention-days: 14

  # Publish the README badge: a shields-endpoint JSON force-pushed to the orphan `badges`
  # branch as a single commit (it never grows). No Codecov, no token beyond the run's
  # GITHUB_TOKEN. README badge: img.shields.io/endpoint?url=<raw badges/coverage.json>.
  badge:
    name: Publish coverage badge
    needs: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Write shields endpoint JSON to the `badges` branch
        env:
          PCT: ${{ needs.coverage.outputs.pct }}
          COLOR: ${{ needs.coverage.outputs.color }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ github.token }}
        run: |
          tmp=$(mktemp -d) && cd "$tmp"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage.json
          git checkout -q --orphan badges
          git add coverage.json
          git commit -q -m "coverage: ${PCT}% [skip ci]"
          git push -q -f "https://x-access-token:${TOKEN}@github.com/${REPO}.git" badges
          echo "Published coverage badge: ${PCT}% (${COLOR})"
