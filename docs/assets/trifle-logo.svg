    <path d="M 34,60 C 58,56 142,58 166,61 C 167,97 153,127 128,150 C 116,161 84,160 70,149 C 48,127 34,97 34,60 Z"/>
    <path d="M 39,62 C 35,41 58,29 100,29 C 142,29 165,41 161,62 Z"/>
    <path d="M 93,150 C 92,161 86,165 88,171 C 89,176 93,178 93,187 L 107,187 C 107,178 111,176 112,171 C 114,165 108,161 107,150"/>
    <path d="M 56,191 C 76,186 124,186 144,191 C 124,197 76,197 56,191 Z"/>
    <path d="M 101,30 C 104,22 110,18 115,17"/>
    <circle cx="101" cy="38" r="9"/>
  </g>

  <!-- art -->
  <g fill="none" stroke="#2B2B2B" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">

    <!-- foot + stem behind the bowl, so the join tucks under the jelly -->
