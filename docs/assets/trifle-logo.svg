      <path d="M 12,160 L 188,160 L 188,95 C 165,90 150,100 128,95 C 106,89 86,101 64,95 C 44,90 28,100 12,96 Z" fill="#E25368" stroke="none"/>
      <path d="M 12,96 C 28,100 44,90 64,95 C 86,101 106,89 128,95 C 150,100 165,90 188,96" stroke-width="3"/>
    </g>

    <!-- glass bowl -->
    <path d="M 34,60 C 58,56 142,58 166,61 C 167,97 153,127 128,150 C 116,161 84,160 70,149 C 48,127 34,97 34,60 Z"/>

    <!-- cream -->
    <path d="M 41,62 C 37,47 51,41 61,47 C 64,34 81,32 89,43 C 95,31 113,33 117,45 C 127,36 147,41 147,53 C 159,51 165,59 159,62 Z" fill="#FFFFFF"/>

    <!-- cherry -->
